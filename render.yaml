services:
  - type: web
    name: xpremchatbot
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    headers:
      # Security
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      # Never long-cache the HTML entry — its <script>/<link> hashes change every build.
      # Without this, edge caches can serve old HTML pointing to bundles that no longer exist.
      - path: /
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /index.html
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      # Hashed assets are content-addressable, safe to cache forever.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA fallback for any non-asset, non-file path.
      - type: rewrite
        source: /*
        destination: /index.html
